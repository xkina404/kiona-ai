version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: kiona-postgres
    environment:
      POSTGRES_USER: kiona
      POSTGRES_PASSWORD: kiona_password
      POSTGRES_DB: kiona_ai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiona"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: kiona-redis
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: kiona-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kiona-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://kiona:kiona_password@postgres:5432/kiona_ai
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    command: npm run start

volumes:
  postgres_data:
  redis_data:
  ollama_data:

networks:
  default:
    name: kiona-network